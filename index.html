<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Harding Illustration</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --text: #1a1a18;
      --muted: #8a8880;
      --line: #d8d5d0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-family: 'Libre Baskerville', serif;
      font-weight: 400;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      letter-spacing: 0.01em;
      line-height: 1.1;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--line);
      margin: 1.6rem 0;
    }

    .label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.1rem;
    }

    .portfolio {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .portfolio li {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
      border-bottom: 1px solid var(--line);
    }
    .portfolio li:nth-child(1) { animation-delay: 0.5s; }
    .portfolio li:nth-child(2) { animation-delay: 0.65s; }
    .portfolio li:nth-child(3) { animation-delay: 0.8s; }

    .portfolio-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.9rem 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      text-align: left;
      transition: color 0.2s ease, padding-left 0.25s ease;
    }

    .portfolio-btn:hover { color: var(--muted); padding-left: 6px; }

    .portfolio-btn .arrow {
      font-size: 0.85rem;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.3s;
      flex-shrink: 0;
      margin-left: 1rem;
    }

    .portfolio-btn.open .arrow {
      opacity: 0.7;
      transform: rotate(90deg);
    }

    .embed-panel {
      display: none;
      padding: 1rem 0 1.5rem;
    }

    .embed-panel.open { display: block; }

    .pdf-frame {
      width: 100%;
      height: 75vh;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }

    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--line);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Tom Harding<br>Illustration</h1>
    <div class="divider"></div>
    <p class="label">Portfolio</p>

    <ul class="portfolio">

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'game-art')">
          Game Development &amp; Game Art <span class="arrow">→</span>
        </button>
        <div class="embed-panel" id="game-art">
          <iframe class="pdf-frame" src="GameArtFolio.pdf" title="Game Art Portfolio"></iframe>
        </div>
      </li>

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'showreel')">
          Game Dev &amp; Art — Show Reel <span class="arrow">→</span>
        </button>
        <div class="embed-panel" id="showreel">
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/frCgh0a3msg" title="Show Reel" allowfullscreen></iframe>
          </div>
        </div>
      </li>

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'illustration')">
          General Portfolio — Illustration, 3D &amp; More <span class="arrow">→</span>
        </button>
        <div class="embed-panel" id="illustration">
          <iframe class="pdf-frame" src="ArtAndIllustrationFolio.pdf" title="Art & Illustration Portfolio"></iframe>
        </div>
      </li>

    </ul>

    <footer>© 2026 Tom Harding</footer>
  </div>

  <script>
    function toggle(btn, id) {
      const panel = document.getElementById(id);
      const isOpen = panel.classList.contains('open');

      document.querySelectorAll('.embed-panel').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.portfolio-btn').forEach(b => b.classList.remove('open'));

      if (!isOpen) {
        panel.classList.add('open');
        btn.classList.add('open');
        setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
      }
    }
  </script>
</body>
</html>
