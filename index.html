<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom Harding Illustration</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-y: scroll; }

    body {
      background: #f7f5f2;
      color: #000;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-family: 'Libre Baskerville', serif;
      font-weight: 400;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: 0.01em;
      line-height: 1.15;
      color: #000;
    }

    .spacer {
      margin-top: 1.4rem;
    }

    .dot-divider {
      display: flex;
      justify-content: center;
      padding: 0.4rem 0;
    }

    .dot-divider span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #000;
      display: block;
    }

    .portfolio {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .portfolio li {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }
    .portfolio li:nth-child(1) { animation-delay: 0.5s; }
    .portfolio li:nth-child(2) { animation-delay: 0.65s; }
    .portfolio li:nth-child(3) { animation-delay: 0.8s; }

    .portfolio-btn {
      display: block;
      width: 100%;
      padding: 0.7rem 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #000;
      font-family: 'Source Sans 3', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-align: center;
      transition: opacity 0.2s ease;
    }

    .portfolio-btn:hover { opacity: 0.55; }

    .embed-panel {
      display: none;
      padding: 0.75rem 0 1.25rem;
    }

    .embed-panel.open { display: block; }

    .pdf-wrapper {
      position: relative;
    }

    .pdf-frame {
      width: 100%;
      height: 70vh;
      border: 1px solid #d8d5d0;
      border-radius: 4px;
      background: #fff;
      display: block;
    }

    .fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.9);
      border: 1px solid #d8d5d0;
      border-radius: 4px;
      padding: 5px 9px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      color: #000;
      font-family: 'Source Sans 3', sans-serif;
      transition: background 0.2s;
    }

    .fullscreen-btn:hover { background: #fff; }

    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #d8d5d0;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #aaa;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      body { padding: 2.5rem 1rem; }
      .pdf-frame { height: 55vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">Tom Harding<br>Illustration</h1>
    <div class="spacer"></div>

    <ul class="portfolio">

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'illustration')">
          General Portfolio — Illustration, 3D &amp; More
        </button>
        <div class="embed-panel" id="illustration">
          <div class="pdf-wrapper">
            <iframe class="pdf-frame" id="frame-illustration" data-pdf="ArtAndIllustrationFolio.pdf" title="Art & Illustration Portfolio"></iframe>
            <button class="fullscreen-btn" onclick="openFullscreen('frame-illustration', 'ArtAndIllustrationFolio.pdf')">⤢ Full Screen</button>
          </div>
        </div>
      </li>

      <div class="dot-divider"><span></span></div>

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'game-art')">
          Game Development &amp; Game Art
        </button>
        <div class="embed-panel" id="game-art">
          <div class="pdf-wrapper">
            <iframe class="pdf-frame" id="frame-game-art" data-pdf="GameArtFolio.pdf" title="Game Art Portfolio"></iframe>
            <button class="fullscreen-btn" onclick="openFullscreen('frame-game-art', 'GameArtFolio.pdf')">⤢ Full Screen</button>
          </div>
        </div>
      </li>

      <div class="dot-divider"><span></span></div>

      <li>
        <button class="portfolio-btn" onclick="toggle(this, 'showreel')">
          Game Dev &amp; Art — Show Reel
        </button>
        <div class="embed-panel" id="showreel">
          <div class="video-wrap">
            <iframe src="https://www.youtube.com/embed/frCgh0a3msg" title="Show Reel" allowfullscreen></iframe>
          </div>
        </div>
      </li>

    </ul>

    <footer>© 2026 Tom Harding</footer>
  </div>

  <script>
    const isMobile = window.innerWidth <= 768;
    const baseUrl = window.location.href.replace(/\/[^/]*$/, '/');

    function getPdfSrc(filename) {
      if (isMobile) {
        return 'https://docs.google.com/viewer?url=' + encodeURIComponent(baseUrl + filename) + '&embedded=true';
      }
      return filename;
    }

    function toggle(btn, id) {
      const panel = document.getElementById(id);
      const isOpen = panel.classList.contains('open');

      document.querySelectorAll('.embed-panel').forEach(p => p.classList.remove('open'));

      if (!isOpen) {
        panel.classList.add('open');
        const frame = panel.querySelector('iframe[data-pdf]');
        if (frame && !frame.src) {
          frame.src = getPdfSrc(frame.getAttribute('data-pdf'));
        }
        setTimeout(() => btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      }
    }

    function openFullscreen(frameId, pdfSrc) {
      const frame = document.getElementById(frameId);
      if (frame.requestFullscreen) {
        frame.requestFullscreen();
      } else if (frame.webkitRequestFullscreen) {
        frame.webkitRequestFullscreen();
      } else {
        window.open(pdfSrc, '_blank');
      }
    }
  </script>
</body>
</html>
